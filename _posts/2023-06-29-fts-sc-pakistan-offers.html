<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script src="https://cdn.jsdelivr.net/npm/minisearch@6.1.0/dist/umd/index.min.js">
  </script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
  <!-- <div id="map" style="height: 500px;"></div> -->
  <div id="offers-block" class="grid grid-cols-3 gap-x-2 gap-y-4 justify-between" style="width: 100%;">
  </div>

  <script>
    const offers = []
    let index

    let filteredOffers = []

    init()

    function init() {
      fetch(window.location.origin + "/assets/fts-sc-pakistan-offers/data.json")
      .then((res) => res.json())
      .then(json => {
        const { offers: { offer } } = json
        offers.push(...offer.sort((a,b) => a.name.localeCompare(b.name)))
        console.log(offers);
        initIndex()
        search("")
      })
    }

    function initIndex() {
      index = new MiniSearch({
        fields: [
          "name",
          "otitle",
          "odesc",
          "cat",
          "sbcat",
          "venue"
        ],
        extractField: (document, fieldName) => {
          if (fieldName !== 'venue') {
            return document[fieldName]
          }

          return document[fieldName].map(venue => venue.add).join('::')
        }
      })

      index.addAll(offers)
    }

    function search(query) {
      if(query) {
        const results = index.search(query, { fuzzy: 0.2 })
        const filteredOffers = offers.filter(offer => results.some(r => r.id === offer.id))

        // console.log(JSON.stringify(searchedOffers, null, 4));
      } else {
        filteredOffers = offers
      }

      const offerHtmlElements = filteredOffers.map(createOfferElement)
      document.getElementById("offers-block").append(...offerHtmlElements)
    }

    function createOfferElement(offer) {
      const card = document.createElement('div')
      card.classList.add(
        'bg-white',
        'rounded-lg',
        'drop-shadow-xl',
        'hover:bg-gray-100',
        'hover:cursor-pointer',
        'text-center'
      )

      const img = document.createElement('img')
      img.src = offer.oimg
      img.alt = `${offer.name} image`

      const details = document.createElement('div')
      details.classList.add('mt-2', 'p-2')

      const name = document.createElement('h5')
      name.classList.add(
        'mb-2',
        'text-xl',
        'font-bold',
        'tracking-tight',
        'text-gray-700',
      )
      name.textContent = offer.name

      const title = document.createElement('p')
      title.classList.add('text-base', 'font-normal', 'text-gray-600', 'mb-2')
      title.textContent = offer.otitle

      details.append(name, title)

      card.append(img, details)

      return card
    }
  </script>
</body>

</html>
